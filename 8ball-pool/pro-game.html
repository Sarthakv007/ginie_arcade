<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Ball Pool Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap');
:root{--gold:#f0c040;--gold2:#c8960a;--bg:#080c10;--panel:#0d1520;--border:rgba(240,192,64,0.25);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Exo 2',sans-serif;overflow:hidden;background-image:url('assets/img/bgLarge.png');background-size:cover;background-position:center;}
/* MENU */
#menuScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:radial-gradient(ellipse at center,rgba(10,26,14,0.95) 0%,rgba(5,10,8,0.98) 100%);}
#menuScreen.hidden{display:none;}
.menu-title{font-family:'Orbitron',monospace;font-size:clamp(2rem,5vw,3.6rem);font-weight:900;color:var(--gold);text-shadow:0 0 60px rgba(240,192,64,0.6);letter-spacing:0.12em;text-align:center;}
.menu-sub{font-size:0.9rem;color:rgba(255,255,255,0.35);letter-spacing:0.3em;text-transform:uppercase;}
.menu-btn{font-family:'Orbitron',monospace;font-size:0.95rem;font-weight:700;letter-spacing:0.15em;padding:14px 48px;border-radius:6px;border:none;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0a;box-shadow:0 6px 30px rgba(240,192,64,0.4);}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(240,192,64,0.6);}
.btn-sec{background:transparent;color:var(--gold);border:1.5px solid var(--gold2);}
.btn-sec:hover{background:rgba(240,192,64,0.08);transform:translateY(-2px);}
.menu-ball-row{display:flex;gap:12px;align-items:center;}
.mb{width:34px;height:34px;border-radius:50%;box-shadow:inset -4px -4px 8px rgba(0,0,0,0.5),inset 3px 3px 8px rgba(255,255,255,0.25);animation:floatB 2s ease-in-out infinite;}
.mb:nth-child(2){animation-delay:.2s}.mb:nth-child(3){animation-delay:.4s}.mb:nth-child(4){animation-delay:.6s}.mb:nth-child(5){animation-delay:.8s}
@keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.mode-cards{display:flex;gap:14px;}
.mode-card{background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:18px 26px;cursor:pointer;text-align:center;transition:all .25s;min-width:140px;}
.mode-card:hover,.mode-card.sel{border-color:var(--gold);background:rgba(240,192,64,0.08);transform:translateY(-3px);box-shadow:0 8px 30px rgba(240,192,64,0.2);}
.mode-card .mi{font-size:1.8rem;margin-bottom:6px;}
.mode-card .mn{font-family:'Orbitron',monospace;font-size:0.75rem;color:var(--gold);letter-spacing:.12em;}
.mode-card .md{font-size:0.72rem;color:rgba(255,255,255,0.35);margin-top:3px;}
/* GAME */
#gameScreen{display:none;flex-direction:column;align-items:center;gap:8px;}
#gameScreen.vis{display:flex;}
#topBar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1000px;padding:0 4px;}
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 16px;min-width:190px;transition:all .3s;position:relative;overflow:hidden;}
.pcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,192,64,0.07),transparent);opacity:0;transition:opacity .3s;}
.pcard.act::before{opacity:1;}
.pcard.act{border-color:var(--gold);box-shadow:0 0 20px rgba(240,192,64,0.2);}
.pcn{font-family:'Orbitron',monospace;font-size:0.72rem;letter-spacing:.15em;color:rgba(255,255,255,0.45);margin-bottom:3px;}
.act .pcn{color:var(--gold);}
.pct{font-weight:700;font-size:.9rem;color:#fff;margin-bottom:5px;}
.pcb{display:flex;flex-wrap:wrap;gap:3px;min-height:14px;}
.pdot{width:15px;height:15px;border-radius:50%;box-shadow:inset -2px -2px 4px rgba(0,0,0,0.5),inset 1px 1px 4px rgba(255,255,255,0.3);border:1px solid rgba(0,0,0,0.3);}
.tarr{font-size:1.2rem;animation:pulse 1s ease-in-out infinite;opacity:0;transition:opacity .3s;}
.act .tarr{opacity:1;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
#cinfo{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;padding:0 14px;}
#gmsg{font-size:.8rem;color:rgba(255,255,255,0.7);text-align:center;background:rgba(0,0,0,0.3);border-radius:20px;padding:4px 14px;border:1px solid rgba(255,255,255,0.07);}
.tbadge{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;}
/* TABLE */
#twrap{position:relative;border-radius:12px;box-shadow:0 0 0 5px #3a2008,0 0 0 10px var(--gold2),0 0 0 15px #3a2008,0 0 80px rgba(0,0,0,0.9);}
canvas{display:block;border-radius:4px;}
/* BOTTOM */
#bbar{display:flex;align-items:center;gap:14px;width:100%;max-width:1000px;}
#spinPanel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 12px;display:flex;flex-direction:column;align-items:center;gap:5px;}
.slbl{font-size:.65rem;color:rgba(255,255,255,0.38);letter-spacing:.15em;text-transform:uppercase;}
#sc{border-radius:50%;cursor:crosshair;background:#0d1520;border:1px solid rgba(255,255,255,0.1);}
#powerPanel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;flex:1;display:flex;flex-direction:column;gap:7px;}
.prow{display:flex;align-items:center;justify-content:space-between;}
.ptxt{font-size:.65rem;color:rgba(255,255,255,0.38);letter-spacing:.15em;text-transform:uppercase;}
#ppct{font-family:'Orbitron',monospace;font-size:.8rem;color:var(--gold);}
#ptrack{width:100%;height:13px;background:rgba(0,0,0,0.5);border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);}
#pbar{height:100%;width:0%;border-radius:7px;background:linear-gradient(90deg,#30c060 0%,#f0c040 50%,#e83030 100%);transition:width .04s;position:relative;}
#pbar::after{content:'';position:absolute;top:2px;left:4px;right:4px;height:3px;background:rgba(255,255,255,0.22);border-radius:3px;}
#btnPanel{display:flex;flex-direction:column;gap:7px;}
.cb{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.1em;padding:7px 14px;border-radius:6px;border:1.5px solid;cursor:pointer;transition:all .2s;text-transform:uppercase;font-weight:700;white-space:nowrap;}
.cb-g{color:var(--gold);border-color:var(--gold2);background:transparent;}
.cb-g:hover{background:rgba(240,192,64,0.12);}
.cb-m{color:#fff;border-color:rgba(255,255,255,0.2);background:transparent;font-size:.75rem;}
.cb-m:hover{background:rgba(255,255,255,0.08);}
/* OVERLAY */
#ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:50;border-radius:4px;}
#ov.show{display:flex;}
#ovt{font-family:'Orbitron',monospace;font-size:2.8rem;font-weight:900;text-align:center;text-shadow:0 0 50px currentColor;}
#ovs{font-size:1rem;color:rgba(255,255,255,0.55);text-align:center;}
.ostat{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.sc{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 18px;text-align:center;}
.sc .sv{font-family:'Orbitron',monospace;font-size:1.3rem;color:var(--gold);}
.sc .sl{font-size:.7rem;color:rgba(255,255,255,0.38);margin-top:2px;letter-spacing:.1em;}
</style>
</head>
<body>
<!-- MENU -->
<div id="menuScreen">
  <div class="menu-ball-row">
    <div class="mb" style="background:radial-gradient(circle at 35% 35%,#ffe060,#f0c040,#c08000)"></div>
    <div class="mb" style="background:radial-gradient(circle at 35% 35%,#60a0ff,#2060c0,#103080)"></div>
    <div class="mb" style="background:radial-gradient(circle at 35% 35%,#ff6060,#e02020,#800010)"></div>
    <div class="mb" style="background:radial-gradient(circle at 35% 35%,#444,#222,#000)"></div>
    <div class="mb" style="background:radial-gradient(circle at 35% 35%,#60e090,#20a040,#085020)"></div>
  </div>
  <div class="menu-title">8-BALL POOL PRO</div>
  <div class="menu-sub">Choose Your Mode</div>
  <div class="mode-cards">
    <div class="mode-card sel" id="mAI" onclick="selMode('ai')"><div class="mi">🤖</div><div class="mn">VS CPU</div><div class="md">Single Player</div></div>
    <div class="mode-card" id="m2P" onclick="selMode('2p')"><div class="mi">👥</div><div class="mn">2 PLAYERS</div><div class="md">Local Multiplayer</div></div>
  </div>
  <button class="menu-btn btn-primary" onclick="startGame()">🎱 START GAME</button>
  <button class="menu-btn btn-sec" onclick="howTo()">? How To Play</button>
</div>
<!-- GAME -->
<div id="gameScreen">
  <div id="topBar">
    <div class="pcard act" id="p1c">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div class="pcn" id="p1n">PLAYER 1</div><div class="pct" id="p1t">—</div><div class="pcb" id="p1b"></div></div>
        <div class="tarr">▶</div>
      </div>
    </div>
    <div id="cinfo">
      <div class="tbadge" id="tbadge">BREAK SHOT</div>
      <div id="gmsg">Aim near cue ball, drag back &amp; release to shoot</div>
    </div>
    <div class="pcard" id="p2c">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="tarr" style="transform:scaleX(-1)">▶</div>
        <div style="text-align:right"><div class="pcn" id="p2n">CPU 🤖</div><div class="pct" id="p2t">—</div><div class="pcb" id="p2b" style="justify-content:flex-end"></div></div>
      </div>
    </div>
  </div>
  <div id="twrap">
    <canvas id="c"></canvas>
    <div id="ov">
      <div id="ovt">🏆 YOU WIN!</div>
      <div id="ovs">Excellent game!</div>
      <div class="ostat" id="ostat"></div>
      <button class="menu-btn btn-primary" onclick="backMenu()">🏠 Main Menu</button>
      <button class="menu-btn btn-sec" onclick="restartGame()">↺ Play Again</button>
    </div>
  </div>
  <div id="bbar">
    <div id="spinPanel">
      <div class="slbl">🎯 Spin</div>
      <canvas id="sc" width="72" height="72"></canvas>
      <div style="font-size:.62rem;color:rgba(255,255,255,0.28);text-align:center" id="slbl2">Center</div>
    </div>
    <div id="powerPanel">
      <div class="prow"><div class="ptxt">⚡ Power</div><div id="ppct">0%</div></div>
      <div id="ptrack"><div id="pbar"></div></div>
      <div style="font-size:.7rem;color:rgba(255,255,255,0.3);text-align:center">Drag away from cue ball → release to shoot</div>
    </div>
    <div id="btnPanel">
      <button class="cb cb-m" id="muteBtn" onclick="toggleMute()">🔊 Sound</button>
      <button class="cb cb-g" onclick="backMenu()">🏠 Menu</button>
      <button class="cb cb-g" onclick="restartGame()">↺ New</button>
    </div>
  </div>
</div>

<script>
// Audio System
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let muted=false,sounds={};
function loadSound(n,u){return fetch(u).then(r=>r.arrayBuffer()).then(ab=>audioCtx.decodeAudioData(ab)).then(buf=>{sounds[n]=buf;}).catch(e=>console.log('Audio:',n,e));}
function playSound(n,v=0.5){if(muted||!sounds[n])return;const s=audioCtx.createBufferSource(),g=audioCtx.createGain();s.buffer=sounds[n];g.gain.value=v;s.connect(g);g.connect(audioCtx.destination);s.start(0);}
function toggleMute(){muted=!muted;document.getElementById('muteBtn').innerHTML=muted?'🔇 Sound':'🔊 Sound';}
Promise.all([loadSound('cue','assets/audio/cueHit.wav'),loadSound('ball','assets/audio/ballHit2.wav'),loadSound('cush','assets/audio/cushionHit.wav'),loadSound('pocket','assets/audio/pocketHit.wav'),loadSound('cheer','assets/audio/cheer.wav'),loadSound('ding','assets/audio/ding.wav'),loadSound('shimmer','assets/audio/shimmer.wav')]).then(()=>console.log('Sounds loaded'));

const C=document.getElementById('c'),ctx=C.getContext('2d');
const SC=document.getElementById('sc'),sctx=SC.getContext('2d');
const W=880,H=480;C.width=W;C.height=H;
const TX=44,TY=34,TW=W-88,TH=H-68;
const BR=12,PR=21,FR=0.9875,WD=0.72,MV=0.055;
const EF=1.18;

const POCKETS=[{x:TX+2,y:TY+2},{x:TX+TW/2,y:TY-4},{x:TX+TW-2,y:TY+2},{x:TX+2,y:TY+TH-2},{x:TX+TW/2,y:TY+TH+4},{x:TX+TW-2,y:TY+TH-2}];
const BC=[null,'#f5c518','#1a5fb4','#e01b24','#9141ac','#e66100','#26a269','#a51d2d','#101010','#f5c518','#1a5fb4','#e01b24','#9141ac','#e66100','#26a269','#a51d2d'];

// Load images
const imgs={};
['cloth','tableTop','pockets','cue','cueShadow','rack','shadow'].forEach(k=>{const i=new Image();i.src=`assets/img/${k}.png`;i.onerror=()=>console.log('Img:',k);imgs[k]=i;});

let gmode='ai',balls=[],cue,cur=0,ptypes=[null,null],pottedTurn=[],firstHit=null,scratch=false,tstate='aim',cpuT=0,over=false,placeCue=false,spinX=0,spinY=0,drag=false,dragFrom=null,power=0,mp={x:0,y:0},shots=[0,0],pots=[0,0],total=0,flashes=[],lastCol=0;

function selMode(m){gmode=m;document.getElementById('mAI').className='mode-card'+(m==='ai'?' sel':'');document.getElementById('m2P').className='mode-card'+(m==='2p'?' sel':'');}

function startGame(){
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.add('vis');
  document.getElementById('p2n').textContent=gmode==='ai'?'CPU 🤖':'PLAYER 2';
  initGame();
}

function backMenu(){document.getElementById('gameScreen').classList.remove('vis');document.getElementById('menuScreen').classList.remove('hidden');document.getElementById('ov').classList.remove('show');}

function howTo(){alert("🎱 HOW TO PLAY\n\n🖱 AIM: Click near cue ball, drag AWAY from it, release to shoot\n⚡ POWER: Drag further = stronger shot\n🎯 SPIN: Click the spin circle to add top/back/side spin\n\nRULES:\n• Pocket assigns your type: Solids (1-7) or Stripes (9-15)\n• Pocket all your balls THEN the 8-ball to WIN\n• Pocket 8-ball early = LOSS\n• Scratch (cue in pocket) = opponent places ball\n\nTIPS:\n• Ghost ball (white circle) shows where cue ball will contact\n• Yellow line shows target ball direction after hit\n• Bigger pockets = easier to sink!");}

function initGame(){
  balls=[];over=false;placeCue=false;cur=0;ptypes=[null,null];pottedTurn=[];firstHit=null;scratch=false;tstate='aim';drag=false;dragFrom=null;power=0;shots=[0,0];pots=[0,0];total=0;flashes=[];spinX=0;spinY=0;lastCol=0;
  document.getElementById('ov').classList.remove('show');
  const cx=TX+TW*0.69,cy=TY+TH/2,sp=BR*2.06;
  const rack=[[1],[2,9],[3,8,10],[4,11,7,12],[6,13,14,15,5]];
  rack.forEach((row,r)=>row.forEach((id,c)=>{
    balls.push({id,r:BR,pocketed:false,x:cx+r*sp*.866+(Math.random()-.5)*.3,y:cy+(c-(row.length-1)/2)*sp+(Math.random()-.5)*.3,vx:0,vy:0});
  }));
  cue={id:0,r:BR,pocketed:false,x:TX+TW*.24,y:TY+TH/2,vx:0,vy:0};
  balls.unshift(cue);
  updateUI();msg("Break shot! Aim &amp; shoot to start 🎱");updateBadge();drawSpin();
}

function myBalls(p){if(ptypes[p]==='solid')return[1,2,3,4,5,6,7];if(ptypes[p]==='stripe')return[9,10,11,12,13,14,15];return[];}
function pname(p){return p===0?'Player 1':(gmode==='ai'?'CPU':'Player 2');}
function isBallPocketed(id){const b=balls.find(b=>b.id===id);return b?b.pocketed:true;}
function allMyBallsPocketed(p){return myBalls(p).every(id=>isBallPocketed(id));}

// PHYSICS
function physStep(){
  const live=balls.filter(b=>!b.pocketed);
  live.forEach(b=>{
    b.x+=b.vx;b.y+=b.vy;
    if(b===cue&&(Math.abs(b.vx)+Math.abs(b.vy))>0.5){b.vx+=spinX*.035;b.vy+=spinY*.035;}
    b.vx*=FR;b.vy*=FR;
    if(Math.abs(b.vx)<MV)b.vx=0;if(Math.abs(b.vy)<MV)b.vy=0;
    if(b.x<TX+b.r){b.x=TX+b.r;b.vx=Math.abs(b.vx)*WD;playSound('cush',0.25);}
    if(b.x>TX+TW-b.r){b.x=TX+TW-b.r;b.vx=-Math.abs(b.vx)*WD;playSound('cush',0.25);}
    if(b.y<TY+b.r){b.y=TY+b.r;b.vy=Math.abs(b.vy)*WD;playSound('cush',0.25);}
    if(b.y>TY+TH-b.r){b.y=TY+TH-b.r;b.vy=-Math.abs(b.vy)*WD;playSound('cush',0.25);}
  });
  for(let i=0;i<live.length;i++){
    for(let j=i+1;j<live.length;j++){
      const a=live[i],b=live[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=a.r+b.r;
      if(d<md&&d>.001){
        if((a.id===0||b.id===0)&&firstHit===null)firstHit=a.id===0?b.id:a.id;
        const now=Date.now();
        if(now-lastCol>100){playSound('ball',0.4);lastCol=now;}
        const nx=dx/d,ny=dy/d,ov=md-d;
        a.x-=nx*ov/2;a.y-=ny*ov/2;b.x+=nx*ov/2;b.y+=ny*ov/2;
        const dv=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
        if(dv>0){const imp=dv*.97;a.vx-=imp*nx;a.vy-=imp*ny;b.vx+=imp*nx;b.vy+=imp*ny;}
      }
    }
  }
  balls.forEach(b=>{
    if(b.pocketed)return;
    for(let pi=0;pi<POCKETS.length;pi++){
      const p=POCKETS[pi];
      if(Math.hypot(b.x-p.x,b.y-p.y)<PR-1){
        b.pocketed=true;b.vx=0;b.vy=0;
        playSound('pocket',0.6);
        if(b.id===0){scratch=true;}else{pottedTurn.push(b.id);pots[cur]++;}
        flashes.push({x:p.x,y:p.y,t:0});
        break;
      }
    }
  });
}

function moving(){return balls.some(b=>!b.pocketed&&(Math.abs(b.vx)>MV||Math.abs(b.vy)>MV));}

// TURN
function turnEnd(){
  const solids=pottedTurn.filter(id=>id>=1&&id<=7),stripes=pottedTurn.filter(id=>id>=9&&id<=15),eight=pottedTurn.includes(8);
  let sw=true;
  if(ptypes[0]===null&&(solids.length>0||stripes.length>0)){
    if(solids.length>=stripes.length){ptypes[cur]='solid';ptypes[1-cur]='stripe';}
    else{ptypes[cur]='stripe';ptypes[1-cur]='solid';}
    updateTypes();playSound('ding',0.5);
  }
  if(eight){
    const done=allMyBallsPocketed(cur);
    endGame(!scratch&&done&&ptypes[cur]!==null?cur:1-cur);return;
  }
  if(scratch){
    sw=true;placeCue=true;cue.pocketed=false;cue.vx=0;cue.vy=0;cue.x=TX+TW*.22;cue.y=TY+TH/2;
    msg("⚠️ Scratch! "+pname(1-cur)+" places cue ball.");
  } else if(firstHit!==null&&ptypes[cur]!==null){
    const needE=allMyBallsPocketed(cur),valid=needE?firstHit===8:myBalls(cur).includes(firstHit);
    if(!valid){sw=true;msg("⚠️ Foul! Wrong ball hit. "+pname(1-cur)+"'s turn.");}
  }
  if(!scratch){
    if(pottedTurn.length>0&&ptypes[cur]!==null){
      const ms=myBalls(cur),mine=pottedTurn.filter(id=>ms.includes(id));
      if(mine.length>0){sw=false;msg("✅ Nice shot! Keep going, "+pname(cur)+"!");playSound('shimmer',0.4);}
      else msg("❌ Wrong ball. "+pname(1-cur)+"'s turn.");
    } else if(pottedTurn.length===0){msg("Miss. "+pname(1-cur)+"'s turn.");}
  }
  if(sw)cur=1-cur;
  pottedTurn=[];firstHit=null;scratch=false;spinX=0;spinY=0;
  updateUI();updateBadge();
  if(!placeCue){
    if(gmode==='ai'&&cur===1){tstate='cpu';cpuT=70+Math.random()*50;msg("🤖 CPU thinking...");}
    else tstate='aim';
  } else tstate='aim';
}

// CPU
function cpuShoot(){
  if(placeCue){cue.x=TX+TW*.22+(Math.random()-.5)*60;cue.y=TY+TH/2+(Math.random()-.5)*80;placeCue=false;}
  if(cue.pocketed){cue.pocketed=false;cue.x=TX+TW*.22;cue.y=TY+TH/2;}
  const ms=myBalls(1),rem=balls.filter(b=>!b.pocketed&&ms.includes(b.id)),eight=balls.find(b=>b.id===8&&!b.pocketed)||null;
  let tgt=null;
  if(rem.length===0&&eight){tgt=eight;}
  else{let best=Infinity;rem.forEach(b=>POCKETS.forEach(p=>{const s=Math.hypot(b.x-p.x,b.y-p.y)*.7+Math.hypot(b.x-cue.x,b.y-cue.y)*.3;if(s<best){best=s;tgt=b;}}));}
  if(!tgt){const a=Math.random()*Math.PI*2;cue.vx=Math.cos(a)*9;cue.vy=Math.sin(a)*9;}
  else{
    let bp=POCKETS[0],bs=Infinity;
    POCKETS.forEach(p=>{const s=Math.hypot(tgt.x-p.x,tgt.y-p.y);if(s<bs){bs=s;bp=p;}});
    const tpx=bp.x-tgt.x,tpy=bp.y-tgt.y,tpl=Math.hypot(tpx,tpy)||1;
    const gx=tgt.x-(tpx/tpl)*BR*2,gy=tgt.y-(tpy/tpl)*BR*2;
    const ang=Math.atan2(gy-cue.y,gx-cue.x)+(Math.random()-.5)*.28;
    const spd=(7+Math.random()*7)*EF;
    cue.vx=Math.cos(ang)*spd;cue.vy=Math.sin(ang)*spd;
  }
  playSound('cue',0.5);
  pottedTurn=[];firstHit=null;scratch=false;shots[1]++;total++;tstate='shot';
}

// DRAW TABLE
function drawTable(){
  if(imgs.cloth&&imgs.cloth.complete){
    ctx.save();ctx.globalAlpha=0.75;const pat=ctx.createPattern(imgs.cloth,'repeat');ctx.fillStyle=pat;ctx.fillRect(TX,TY,TW,TH);ctx.restore();
  } else {
    const fg=ctx.createLinearGradient(TX,TY,TX+TW,TY+TH);
    fg.addColorStop(0,'#1d8a50');fg.addColorStop(.5,'#22a05c');fg.addColorStop(1,'#1d8a50');
    ctx.fillStyle=fg;ctx.fillRect(TX,TY,TW,TH);
  }
  ctx.save();for(let i=0;i<500;i++){ctx.fillStyle=`rgba(0,0,0,${Math.random()*.045})`;ctx.fillRect(TX+Math.random()*TW,TY+Math.random()*TH,1,1);}ctx.restore();
  ctx.fillStyle='#7a4020';
  [[TX-26,TY-26,TW+52,26],[TX-26,TY+TH,TW+52,26],[TX-26,TY-26,26,TH+52],[TX+TW,TY-26,26,TH+52]].forEach(([x,y,w,h])=>ctx.fillRect(x,y,w,h));
  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(TX-26,TY-26,TW+52,3);ctx.fillRect(TX-26,TY-26,3,TH+52);
  [[TX+TW*.25,TY-14],[TX+TW*.5,TY-14],[TX+TW*.75,TY-14],[TX+TW*.25,TY+TH+14],[TX+TW*.5,TY+TH+14],[TX+TW*.75,TY+TH+14],[TX-14,TY+TH*.25],[TX-14,TY+TH*.5],[TX-14,TY+TH*.75],[TX+TW+14,TY+TH*.25],[TX+TW+14,TY+TH*.5],[TX+TW+14,TY+TH*.75]].forEach(([dx,dy])=>{
    ctx.save();ctx.translate(dx,dy);ctx.rotate(Math.PI/4);
    const dg=ctx.createRadialGradient(0,0,0,0,0,6);dg.addColorStop(0,'#ffe080');dg.addColorStop(1,'#c08010');
    ctx.fillStyle=dg;ctx.fillRect(-4,-4,8,8);ctx.restore();
  });
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(TX+TW*.25,TY+6);ctx.lineTo(TX+TW*.25,TY+TH-6);ctx.stroke();ctx.setLineDash([]);
  POCKETS.forEach(p=>{
    const pg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,PR+8);pg.addColorStop(0,'rgba(0,0,0,0.96)');pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg;ctx.beginPath();ctx.arc(p.x,p.y,PR+8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#040404';ctx.beginPath();ctx.arc(p.x,p.y,PR,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(200,160,40,0.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,PR,0,Math.PI*2);ctx.stroke();
  });
}

// AIM GUIDE
function drawAim(){
  if(!cue||tstate!=='aim'||cue.pocketed||placeCue||!drag||!dragFrom)return;
  const dx=cue.x-dragFrom.x,dy=cue.y-dragFrom.y,dist=Math.hypot(dx,dy);
  if(dist<4)return;
  const ang=Math.atan2(dy,dx),nx=Math.cos(ang),ny=Math.sin(ang);
  const ghost=findGhost(cue.x,cue.y,nx,ny);
  const le=ghost?{x:ghost.cx-nx*BR,y:ghost.cy-ny*BR}:{x:cue.x+nx*320,y:cue.y+ny*320};
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;ctx.setLineDash([10,7]);
  ctx.beginPath();ctx.moveTo(cue.x+nx*BR,cue.y+ny*BR);ctx.lineTo(le.x,le.y);ctx.stroke();ctx.setLineDash([]);
  if(ghost){
    ctx.strokeStyle='rgba(255,255,255,0.38)';ctx.lineWidth=1.8;ctx.beginPath();ctx.arc(ghost.cx,ghost.cy,BR,0,Math.PI*2);ctx.stroke();
    if(ghost.ball){
      const dx2=ghost.cx-ghost.ball.x,dy2=ghost.cy-ghost.ball.y,d2=Math.hypot(dx2,dy2)||1;
      ctx.strokeStyle='rgba(255,200,80,0.45)';ctx.lineWidth=1.2;ctx.setLineDash([6,5]);
      ctx.beginPath();ctx.moveTo(ghost.ball.x,ghost.ball.y);ctx.lineTo(ghost.ball.x+(dx2/d2)*130,ghost.ball.y+(dy2/d2)*130);ctx.stroke();ctx.setLineDash([]);
    }
  }
  ctx.restore();
  // Cue stick
  const tipG=BR+4,cueBack=tipG+power*42;
  ctx.save();ctx.translate(cue.x,cue.y);ctx.rotate(ang+Math.PI);ctx.translate(cueBack,0);
  if(imgs.cue&&imgs.cue.complete){
    ctx.drawImage(imgs.cue,0,-6,185,12);
  } else {
    const cg=ctx.createLinearGradient(0,-3,185,3);cg.addColorStop(0,'#f0e0c0');cg.addColorStop(.25,'#d4a060');cg.addColorStop(.6,'#a07040');cg.addColorStop(1,'#6a4020');
    ctx.fillStyle=cg;ctx.beginPath();ctx.moveTo(0,-3);ctx.lineTo(185,-6);ctx.lineTo(185,6);ctx.lineTo(0,3);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=.5;ctx.stroke();
    ctx.fillStyle='#3a70c0';ctx.fillRect(-4,-3,4,6);
  }
  ctx.restore();
}

function findGhost(ox,oy,nx,ny){
  let minT=Infinity,hb=null;
  balls.filter(b=>!b.pocketed&&b.id!==0).forEach(b=>{
    const lx=b.x-ox,ly=b.y-oy,tc=lx*nx+ly*ny;
    if(tc<0)return;
    const d2=lx*lx+ly*ly-tc*tc,r2=(BR*2)**2;
    if(d2>r2)return;
    const t=tc-Math.sqrt(r2-d2);
    if(t>0&&t<minT){minT=t;hb=b;}
  });
  if(!hb)return null;
  return{cx:ox+nx*minT,cy:oy+ny*minT,ball:hb};
}

function drawBall(b){
  if(b.pocketed)return;
  const{x,y,r,id}=b;
  if(imgs.shadow&&imgs.shadow.complete){
    ctx.globalAlpha=0.35;ctx.drawImage(imgs.shadow,x-r,y-r,r*2,r*2);ctx.globalAlpha=1;
  } else {
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(x+4,y+5,r*.9,r*.48,0,0,Math.PI*2);ctx.fill();
  }
  ctx.save();ctx.translate(x,y);
  if(id===0){
    const g=ctx.createRadialGradient(-r*.3,-r*.3,r*.04,0,0,r);g.addColorStop(0,'#fff');g.addColorStop(.5,'#f0f0f0');g.addColorStop(1,'#c5c5c5');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
  } else {
    const col=BC[id],isSt=id>=9;
    if(isSt){
      const wg=ctx.createRadialGradient(-r*.3,-r*.3,r*.04,0,0,r);wg.addColorStop(0,'#fff');wg.addColorStop(1,'#ddd');
      ctx.fillStyle=wg;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=col;ctx.save();ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.clip();ctx.fillRect(-r,-r*.42,r*2,r*.84);ctx.restore();
    } else {
      const sg=ctx.createRadialGradient(-r*.35,-r*.35,r*.04,0,0,r);
      sg.addColorStop(0,lc(col,45));sg.addColorStop(.5,col);sg.addColorStop(1,dc(col,35));
      ctx.fillStyle=sg;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.beginPath();ctx.arc(0,0,r*.37,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.font=`bold ${r*.52}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(id,0,.5);
  }
  ctx.fillStyle='rgba(255,255,255,0.36)';ctx.beginPath();ctx.ellipse(-r*.28,-r*.28,r*.22,r*.13,-Math.PI/4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=.5;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

function lc(h,a){return`rgb(${Math.min(255,parseInt(h.slice(1,3),16)+a)},${Math.min(255,parseInt(h.slice(3,5),16)+a)},${Math.min(255,parseInt(h.slice(5,7),16)+a)})`;}
function dc(h,a){return`rgb(${Math.max(0,parseInt(h.slice(1,3),16)-a)},${Math.max(0,parseInt(h.slice(3,5),16)-a)},${Math.max(0,parseInt(h.slice(5,7),16)-a)})`;}

function drawFlashes(){
  flashes=flashes.filter(f=>f.t<1);
  flashes.forEach(f=>{f.t+=.065;const r=PR*(.5+f.t*2);const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,r);g.addColorStop(0,`rgba(240,192,64,${(1-f.t)*.85})`);g.addColorStop(1,'rgba(240,192,64,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(f.x,f.y,r,0,Math.PI*2);ctx.fill();});
}

function drawPlaceCue(){
  if(!placeCue)return;
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.arc(mp.x,mp.y,BR,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.arc(mp.x,mp.y,BR,0,Math.PI*2);ctx.fill();
}

// SPIN
function drawSpin(){
  sctx.clearRect(0,0,72,72);
  const cx=36,cy=36,cr=29;
  sctx.fillStyle='#0d1520';sctx.beginPath();sctx.arc(cx,cy,cr,0,Math.PI*2);sctx.fill();
  sctx.strokeStyle='rgba(255,255,255,0.1)';sctx.lineWidth=1;
  sctx.beginPath();sctx.moveTo(cx-cr,cy);sctx.lineTo(cx+cr,cy);sctx.stroke();
  sctx.beginPath();sctx.moveTo(cx,cy-cr);sctx.lineTo(cx,cy+cr);sctx.stroke();
  const sg=sctx.createRadialGradient(cx-4,cy-4,1,cx,cy,cr*.9);sg.addColorStop(0,'rgba(255,255,255,0.12)');sg.addColorStop(1,'rgba(255,255,255,0.02)');
  sctx.fillStyle=sg;sctx.beginPath();sctx.arc(cx,cy,cr,0,Math.PI*2);sctx.fill();
  sctx.strokeStyle='rgba(240,192,64,0.28)';sctx.lineWidth=1.5;sctx.beginPath();sctx.arc(cx,cy,cr,0,Math.PI*2);sctx.stroke();
  const ddx=spinX*cr*.85,ddy=spinY*cr*.85;
  sctx.fillStyle='rgba(240,192,64,0.22)';sctx.beginPath();sctx.arc(cx+ddx,cy+ddy,9,0,Math.PI*2);sctx.fill();
  sctx.fillStyle='#f0c040';sctx.beginPath();sctx.arc(cx+ddx,cy+ddy,4,0,Math.PI*2);sctx.fill();
  const mag=Math.hypot(spinX,spinY),ang=Math.atan2(spinY,spinX);
  let lbl='Center';
  if(mag>.18){const i=Math.round((ang/(Math.PI*2)*8)+8)%8;lbl=['Right','Top-Right','Top','Top-Left','Left','Bottom-Left','Bottom','Bottom-Right'][i];}
  document.getElementById('slbl2').textContent=lbl;
}

function setSpin(nx,ny){const dx=(nx-.5)*2,dy=(ny-.5)*2,m=Math.hypot(dx,dy);if(m>1){spinX=dx/m;spinY=dy/m;}else{spinX=dx;spinY=dy;}drawSpin();}

SC.addEventListener('mousedown',e=>{const r=SC.getBoundingClientRect();setSpin((e.clientX-r.left)/72,(e.clientY-r.top)/72);});
SC.addEventListener('mousemove',e=>{if(e.buttons!==1)return;const r=SC.getBoundingClientRect();setSpin((e.clientX-r.left)/72,(e.clientY-r.top)/72);});
SC.addEventListener('touchstart',e=>{e.preventDefault();const r=SC.getBoundingClientRect();setSpin((e.touches[0].clientX-r.left)/72,(e.touches[0].clientY-r.top)/72);},{passive:false});
SC.addEventListener('touchmove',e=>{e.preventDefault();const r=SC.getBoundingClientRect();setSpin((e.touches[0].clientX-r.left)/72,(e.touches[0].clientY-r.top)/72);},{passive:false});

// INPUT
function getMp(e){const r=C.getBoundingClientRect();return{mx:(e.clientX-r.left)*(W/r.width),my:(e.clientY-r.top)*(H/r.height)};}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

C.addEventListener('mousedown',e=>{
  const{mx,my}=getMp(e);if(over)return;
  if(placeCue&&(gmode==='2p'||cur===0)){
    if(mx<TX+TW*.38){
      const nx=clamp(mx,TX+BR+2,TX+TW*.38),ny=clamp(my,TY+BR+2,TY+TH-BR-2);
      const ok=balls.filter(b=>!b.pocketed&&b.id!==0).every(b=>Math.hypot(b.x-nx,b.y-ny)>BR*2.1);
      if(ok){cue.x=nx;cue.y=ny;placeCue=false;tstate='aim';msg(pname(cur)+"'s turn! Aim &amp; shoot.");}
      else msg("⚠️ Space occupied! Try another spot.");
    }else msg("Place cue ball in the left zone (before dashed line)");
    return;
  }
  if(tstate!=='aim'||(gmode==='ai'&&cur===1))return;
  if(!cue||cue.pocketed)return;
  if(Math.hypot(mx-cue.x,my-cue.y)<BR*3.8){drag=true;dragFrom={x:mx,y:my};}
});

C.addEventListener('mousemove',e=>{const{mx,my}=getMp(e);mp={x:mx,y:my};if(drag)dragFrom={x:mx,y:my};});

C.addEventListener('mouseup',e=>{
  if(!drag)return;drag=false;
  if(tstate!=='aim'||(gmode==='ai'&&cur===1)){dragFrom=null;return;}
  if(!cue||cue.pocketed||!dragFrom){dragFrom=null;return;}
  const dx=cue.x-dragFrom.x,dy=cue.y-dragFrom.y,dist=Math.hypot(dx,dy);
  if(dist<5){dragFrom=null;return;}
  const ang=Math.atan2(dy,dx);power=Math.min(dist/135,1);
  const spd=power*18*EF;cue.vx=Math.cos(ang)*spd;cue.vy=Math.sin(ang)*spd;
  playSound('cue',0.6);
  shots[0]++;total++;pottedTurn=[];firstHit=null;scratch=false;tstate='shot';
  dragFrom=null;power=0;document.getElementById('pbar').style.width='0%';document.getElementById('ppct').textContent='0%';
});

C.addEventListener('touchstart',e=>{e.preventDefault();C.dispatchEvent(new MouseEvent('mousedown',mft(e)));},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();C.dispatchEvent(new MouseEvent('mousemove',mft(e)));},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();C.dispatchEvent(new MouseEvent('mouseup',mft(e)));},{passive:false});
function mft(e){const t=e.touches[0]||e.changedTouches[0];return{clientX:t.clientX,clientY:t.clientY};}

// GAME LOOP
function loop(){
  ctx.clearRect(0,0,W,H);
  drawTable();
  if(!cue){requestAnimationFrame(loop);return;}
  if(tstate==='cpu'&&!moving()&&!over){cpuT--;if(cpuT<=0)cpuShoot();}
  if(tstate==='shot'){for(let i=0;i<3;i++)physStep();if(!moving()){tstate='aim';turnEnd();}}
  if(drag&&dragFrom&&cue&&!cue.pocketed){
    const dx=cue.x-dragFrom.x,dy=cue.y-dragFrom.y;power=Math.min(Math.hypot(dx,dy)/135,1);
    document.getElementById('pbar').style.width=(power*100)+'%';document.getElementById('ppct').textContent=Math.round(power*100)+'%';
  }
  drawAim();balls.forEach(b=>drawBall(b));drawPlaceCue();drawFlashes();
  requestAnimationFrame(loop);
}

function endGame(winner){
  over=true;
  const ot=document.getElementById('ovt'),os=document.getElementById('ovs');
  if(gmode==='2p'){ot.textContent=`🏆 PLAYER ${winner+1} WINS!`;ot.style.color='#f0c040';os.textContent='Great match!';}
  else if(winner===0){ot.textContent='🏆 YOU WIN!';ot.style.color='#f0c040';os.textContent='Excellent performance!';}
  else{ot.textContent='🤖 CPU WINS';ot.style.color='#e83030';os.textContent='Better luck next time!';}
  document.getElementById('ostat').innerHTML=`<div class="sc"><div class="sv">${total}</div><div class="sl">Total Shots</div></div><div class="sc"><div class="sv">${pots[winner]}</div><div class="sl">Balls Potted</div></div>`;
  document.getElementById('ov').classList.add('show');
  playSound('cheer',0.7);
}

// UI
function updateTypes(){
  document.getElementById('p1t').textContent=ptypes[0]==='solid'?'● Solids (1-7)':ptypes[0]==='stripe'?'◎ Stripes (9-15)':'—';
  document.getElementById('p2t').textContent=ptypes[1]==='solid'?'● Solids (1-7)':ptypes[1]==='stripe'?'◎ Stripes (9-15)':'—';
}
function updateUI(){
  document.getElementById('p1c').className='pcard'+(cur===0?' act':'');
  document.getElementById('p2c').className='pcard'+(cur===1?' act':'');
  updateTypes();
  [0,1].forEach(p=>{
    const mb=myBalls(p),pk=balls.filter(b=>b.pocketed&&mb.includes(b.id)),el=document.getElementById(p===0?'p1b':'p2b');
    el.innerHTML='';pk.forEach(b=>{const d=document.createElement('div');d.className='pdot';d.style.background=BC[b.id];el.appendChild(d);});
  });
}
function updateBadge(){document.getElementById('tbadge').textContent=pname(cur).toUpperCase()+"'S TURN";}
function msg(m){document.getElementById('gmsg').innerHTML=m;}
function restartGame(){document.getElementById('ov').classList.remove('show');initGame();}

drawSpin();loop();
</script>
